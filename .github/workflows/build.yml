name: Build Vial Firmware

on:
  push:
    branches: [ cleanup-keybords ]
  workflow_dispatch:  # 手動実行もOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Vial firmware
        uses: ./actions/build-vial
        with:
          keyboard: orthotenkey
          keymap: vial

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: vial-firmware
          path: output/
