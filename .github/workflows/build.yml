name: QMK Firmware Build Action

on:
  push:
    branches:
      - cleanup-keyboards

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      # ご自身のリポジトリをclone
      - name: Checkout code
        uses: tairariat0223/vial-qmk@cleanup-keyboards

      # ビルドしたいkeyboard, rev, keymapを指定
      - name: QMK Build firmware Action
        uses: tairariat0223/vial-qmk@cleanup-keyboard
        with:
          keyboard: '33hand'
          rev: 'rev1'
          keymap: 'vial'

  
      # 生成された.hexファイルをartifactとしてアーカイブ保存
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ github.workspace }}/output/*.hex
