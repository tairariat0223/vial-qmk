name: Build Vial QMK Firmware (RP2040, Auto UTF-8)

on:
  workflow_dispatch:  # 手動トリガー用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git gcc-arm-none-eabi binutils-arm-none-eabi
          python3 -m pip install qmk

      - name: Setup QMK
        run: |
          qmk setup --yes

      - name: Convert all keymaps and rules.mk to UTF-8
        run: |
          # rules.mk を UTF-8 に変換
          if [ -f keyboards/33hand/rules.mk ]; then
            iconv -f SHIFT-JIS -t UTF-8 keyboards/33hand/rules.mk -o keyboards/33hand/rules.mk.utf8 || true
            mv keyboards/33hand/rules.mk.utf8 keyboards/33hand/rules.mk || true
          fi

          # keymaps フォルダ内のすべての keymap.c を UTF-8 に変換
          for km in keyboards/33hand/keymaps/*/keymap.c; do
            if [ -f "$km" ]; then
              iconv -f SHIFT-JIS -t UTF-8 "$km" -o "$km.utf8" || true
              mv "$km.utf8" "$km" || true
            fi
          done

      - name: Compile firmware (33hand/vial for RP2040)
        run: |
          qmk compile -kb 33hand -km vial

      - name: Upload UF2 firmware
        uses: actions/upload-artifact@v3
        with:
          name: 33hand-vial-rp2040
          path: "*.uf2"
